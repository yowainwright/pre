name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        run: make release VERSION=${{ github.ref_name }}

      - name: Checksums
        working-directory: dist
        run: |
          sha256sum pre-darwin-arm64 > pre-darwin-arm64.sha256
          sha256sum pre-darwin-amd64 > pre-darwin-amd64.sha256
          sha256sum pre-linux-amd64  > pre-linux-amd64.sha256

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/pre-darwin-arm64
            dist/pre-darwin-amd64
            dist/pre-linux-amd64
            dist/pre-darwin-arm64.sha256
            dist/pre-darwin-amd64.sha256
            dist/pre-linux-amd64.sha256
          generate_release_notes: true
