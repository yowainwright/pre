version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/pre
    binary: pre
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - formats: [binary]
    name_template: "pre-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: checksums.txt
  algorithm: sha256

signs:
  - cmd: cosign
    args:
      - sign-blob
      - --yes
      - --bundle=${signature}
      - ${artifact}
    artifacts: checksum
    signature: ${artifact}.bundle

brews:
  - name: pre
    repository:
      owner: yowainwright
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: github-actions[bot]
      email: github-actions[bot]@users.noreply.github.com
    homepage: https://github.com/yowainwright/pre
    description: Security proxy for package managers
    license: MIT
    install: bin.install Dir["pre-*"].first => "pre"
    test: assert_match version.to_s, shell_output("#{bin}/pre --version")

changelog:
  sort: asc
  filters:
    exclude:
      - "^chore:"
      - "^docs:"
      - "^test:"
